name: Feature request
description: Suggest an improvement
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Please check `CLAUDE.md` first — Tremurex has explicit **non-goals** (it is not a runtime
        gateway, APM platform, or multi-tenant SaaS). Requests within scope move fastest.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and what gets in the way?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: phase
    attributes:
      label: Related roadmap area
      options:
        - Polling REST drift detection
        - MCP server monitoring
        - Passive proxy capture
        - CI integration
        - Diff / severity engine
        - Web UI
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
