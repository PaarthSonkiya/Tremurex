name: tremurex

services:
  core:
    build:
      context: .
      dockerfile: apps/core/Dockerfile
    ports:
      - '${CORE_PORT:-4000}:4000'
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-tremurex}:${POSTGRES_PASSWORD:-tremurex}@postgres:5432/${POSTGRES_DB:-tremurex}
      REDIS_URL: redis://redis:6379
      SCHEMA_ENGINE_URL: http://schema-engine:8000
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      schema-engine:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4000/health']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '${WEB_PORT:-3000}:80'
    depends_on:
      core:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:80/']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  schema-engine:
    build:
      context: services/schema-engine
    ports:
      - '${SCHEMA_ENGINE_PORT:-8000}:8000'
    healthcheck:
      test:
        [
          'CMD',
          'python',
          '-c',
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tremurex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tremurex}
      POSTGRES_DB: ${POSTGRES_DB:-tremurex}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}']
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  redis-data:
